<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存取拒絕 - 系統安全警告</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
            /* 預設讓滑鼠變成旋轉圈圈，讓人一進來就覺得卡卡的 */
            cursor: wait !important;
        }

        .warning-container {
            max-width: 700px;
            padding: 40px;
            border: 2px solid #d63031;
            background-color: #fff5f5;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .icon {
            font-size: 80px;
            color: #d63031;
            margin-bottom: 20px;
        }

        h1 {
            color: #d63031;
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 2px solid #d63031;
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        .details {
            text-align: left;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            border: 1px solid #fab1a0;
            line-height: 1.8;
            font-size: 16px;
        }

        .notice {
            margin-top: 25px;
            font-weight: bold;
            color: #c0392b;
        }

        #timer {
            font-weight: bold;
            color: #d63031;
            font-size: 20px;
        }

        /* 終極當機遮罩層 */
        #crash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            display: none;
            /* 當機圖出現時，滑鼠可以選擇消失或是維持旋轉 */
            cursor: none !important; 
        }

        #crash-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="warning-container">
        <div class="icon">⚠️</div>
        <h1>您 已 違 反 網 路 使 用 原 則</h1>
        
        <div class="details">
            <strong>偵測事件：</strong> 非法存取受限學術資源 (Unauthorized Access)<br>
            <strong>違規代碼：</strong> CIV-LAW-2026-X9<br>
            <strong>來源 IP：</strong> <span id="ip-address">載入中...</span><br>
            <strong>處理動作：</strong> 您的設備識別碼已紀錄，系統正在將封包傳送至相關單位。
        </div>

        <p class="notice">
            請勿關閉視窗或切換頁面，身分比對中...<br>
            剩餘時間：<span id="timer">10</span> 秒
        </p>
    </div>

    <div id="crash-overlay">
        <img src="https://truth.bahamut.com.tw/s01/202401/forum/60030/e0b2b1b0eb4d1c21eb40e857c003ab10.PNG" alt="System Crash">
    </div>

    <script>
        // 自動生成隨機 IP
        const randomIP = `140.112.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        document.getElementById('ip-address').innerText = randomIP;

        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                triggerFinalPrank();
            }
        }, 1000);

        function triggerFinalPrank() {
            // 顯示當機圖
            document.getElementById('crash-overlay').style.display = 'block';
            
            // 進入全螢幕增加真實感
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // 確保滑鼠徹底消失或變圈圈
            document.documentElement.style.cursor = 'none';
        }

        // 禁用右鍵與 F12，增加緊張感
        document.oncontextmenu = () => false;
        document.onkeydown = (e) => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
                return false;
            }
        };
    </script>
</body>
</html>
