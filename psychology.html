<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理學 - 多維度人格整合分析</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 550px;
            width: 90%;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            background-color: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress-fill {
            width: 15%;
            background-color: #3498db;
            height: 100%;
            transition: width 0.3s ease;
        }

        h2 { color: #2c3e50; font-size: 1.5rem; margin-top: 0; }

        .question {
            font-size: 1.15rem;
            margin-bottom: 25px;
            color: #34495e;
            line-height: 1.5;
            text-align: left;
            font-weight: bold;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            padding: 15px;
            border: 1px solid #dcdde1;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 1rem;
        }

        .option-btn:hover {
            background-color: #f1f9ff;
            border-color: #3498db;
            color: #3498db;
        }

        #analyzing { display: none; }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
